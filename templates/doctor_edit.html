<form method="POST">
    {% csrf_token %}

    <input type="number" name="age" value="{{ patient.age }}">
    <input type="text" name="gender" value="{{ patient.gender }}">
    <input type="text" name="blood_group" value="{{ patient.blood_group }}">
    <input type="text" name="allergies" value="{{ patient.allergies }}">
    <input type="text" name="emergency_contact" value="{{ patient.emergency_contact }}">

    <!-- phone readonly -->
    <input type="text" value="{{ patient.phone }}" readonly>

    <button type="submit">Update</button>
</form>
