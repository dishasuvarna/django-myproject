<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Patient Registration</h2>

<input type="text" id="patient_id" placeholder="Patient ID"><br>
<input type="text" id="name" placeholder="Name"><br>
<input type="number" id="age" placeholder="Age"><br>
<input type="text" id="gender" placeholder="Gender"><br>
<input type="text" id="phone" placeholder="Phone"><br>
<input type="text" id="address" placeholder="Address"><br>
<input type="text" id="blood_group" placeholder="Blood Group"><br>
<input type="text" id="allergies" placeholder="Allergies"><br>
<input type="text" id="emergency_contact" placeholder="Emergency Contact"><br>

<button onclick="registerPatient()">Register</button>

<div id="result"></div>

<script>
function registerPatient() {
    const data = {
        patient_id: document.getElementById('patient_id').value,
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        blood_group: document.getElementById('blood_group').value,
        allergies: document.getElementById('allergies').value,
        emergency_contact: document.getElementById('emergency_contact').value
    };

    fetch('/register-patient-api/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            `<p>${data.message}</p><img src="${data.qr_code}" width="150">`;
    });
}
</script>
</div>
    
</body>
</html>
