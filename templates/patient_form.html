<!DOCTYPE html>
<html>
<head>
    <title>Patient Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 300px;
            margin: 60px auto;
            padding: 20px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5edb;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Patient Form</h2>

    <form method="POST">
          {% csrf_token %}
        <input type="number" name="age" value="{{ form.age }}" placeholder="Age" required>

        <!-- ✅ Gender Dropdown Added -->
        <select name="gender" required>
    <option value="">Select Gender</option>
    <option {% if form.gender == "Male" %}selected{% endif %}>Male</option>
    <option {% if form.gender == "Female" %}selected{% endif %}>Female</option>
    <option {% if form.gender == "Other" %}selected{% endif %}>Other</option>
</select>

        <!-- <input type="tel" name="phone" placeholder="Phone Number" required> -->

        <label>Phone Number:</label>
        <input type="text" value="{{ phone }}" readonly style="pointer-events: none;">
        <input type="text" name="blood_group" value="{{ form.blood_group }}" placeholder="Blood Group">
        <input type="text" name="allergies" value="{{ form.allergies }}" placeholder="Allergies (if any)">
        <input type="tel" name="emergency_contact" value="{{ form.emergency_contact }}" placeholder="Emergency Contact">

        <button type="submit">Submit</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

</div>

</body>
</html>
