<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Patient Registration</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required value="{{ username }}">
    <input type="password" name="password" placeholder="Password" required>
    <input type="text" name="phone" placeholder="Phone" required value="{{ phone }}">

    <!-- SEND OTP -->
    <button type="submit" name="action" value="send_otp">Send OTP</button>

    <!-- SHOW AFTER OTP -->
    {% if otp_sent %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit" name="action" value="verify_otp">Register</button>
    {% endif %}

</form>
    <a href="/login/">Already have an account? Login</a>
</div>

</body>
</html>
